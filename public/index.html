<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>LETRAX — Infinite Wordle</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div class="logo">LETRAX<span>infinite wordle</span></div>
  <div class="header-btns">
    <button class="header-btn new-game-btn" onclick="confirmNewGame()">New</button>
    <button class="header-btn" onclick="showStats()">Stats</button>
    <button class="header-btn settings-btn" onclick="toggleSettings()" id="settings-toggle">&#9881;</button>
  </div>
</header>

<div class="settings-panel" id="settings-panel">
  <div class="settings-row">
    <div class="settings-label">Dark theme</div>
    <label class="toggle">
      <input type="checkbox" id="theme-toggle" onchange="toggleTheme(this.checked)">
      <span class="toggle-track"></span>
      <span class="toggle-thumb"></span>
    </label>
  </div>
  <div class="settings-row">
    <div class="settings-label">
      Difficulty mode
      <small>Changes scoring and adds timer/hints</small>
    </div>
    <label class="toggle">
      <input type="checkbox" id="diff-toggle" onchange="toggleDifficultyMode(this.checked)">
      <span class="toggle-track"></span>
      <span class="toggle-thumb"></span>
    </label>
  </div>
  <div class="settings-row diff-row-container" id="diff-row-container" style="display:none">
    <div class="diff-row" style="width:100%">
      <button class="diff-btn" id="diff-easy" onclick="setDifficulty('easy')">
        Easy<span class="diff-mult">x0.5</span>
      </button>
      <button class="diff-btn active-normal" id="diff-normal" onclick="setDifficulty('normal')">
        Normal<span class="diff-mult">x1.0</span>
      </button>
      <button class="diff-btn" id="diff-hard" onclick="setDifficulty('hard')">
        Hard<span class="diff-mult">x2.0</span>
      </button>
    </div>
  </div>
</div>

<div id="game-area">
  <div class="game-info-bar">
    <span class="timer-display" id="timer"></span>
    <span class="hint-display" id="hint"></span>
    <span class="score-display" id="score-display"></span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot c"></div>Correct</div>
    <div class="legend-item"><div class="legend-dot p"></div>Wrong spot</div>
    <div class="legend-item"><div class="legend-dot a"></div>Not in word</div>
  </div>
  <div id="board"></div>
</div>

<div id="toast"></div>
<div id="keyboard"></div>

<div class="modal-overlay" id="modal">
  <div class="modal"><div class="modal-inner">
    <button class="btn-close" onclick="closeModal()">&#10005;</button>
    <div id="modal-content"></div>
  </div></div>
</div>

<script src="/js/words.js"></script>
<script src="/js/stats.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/game.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
