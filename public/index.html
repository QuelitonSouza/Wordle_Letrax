<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>LETRAX — Infinite Wordle</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div class="logo">LETRAX<span>infinite wordle</span></div>
  <div class="header-btns">
    <button class="new-game-btn" onclick="confirmNewGame()">New</button>
    <button class="stats-btn" onclick="showStats()">Stats</button>
  </div>
</header>

<div id="game-area">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot c"></div>Correct</div>
    <div class="legend-item"><div class="legend-dot p"></div>Wrong spot</div>
    <div class="legend-item"><div class="legend-dot a"></div>Not in word</div>
  </div>
  <div id="board"></div>
</div>

<div id="toast"></div>
<div id="keyboard"></div>

<div class="modal-overlay" id="modal">
  <div class="modal"><div class="modal-inner">
    <button class="btn-close" onclick="closeModal()">&#10005;</button>
    <div id="modal-content"></div>
  </div></div>
</div>

<script src="/js/words.js"></script>
<script src="/js/stats.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/game.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
